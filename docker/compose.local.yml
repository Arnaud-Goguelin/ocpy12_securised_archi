services:
  crm-db:
    container_name: crm-db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: docker_crm_db_user
      POSTGRES_PASSWORD: crm_db_password
    volumes:
      - crm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker_crm_db_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  crm-app:
    container_name: crm-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DB_HOST: crm-db
      DB_PORT: 5432
      DB_NAME: crm-db
      POSTGRES_USER: docker_crm_db_user
      POSTGRES_PASSWORD: crm_db_password
    depends_on:
      crm-db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  crm-db-data:
